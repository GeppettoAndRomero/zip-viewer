# Deploy this tool to Cloudflare Pages on push. FROZEN CORE — copied verbatim into
# every new tool by handbook/bin/new-tool.sh; the slug-surface sed rewrites the
# `zip-viewer` project name to the new slug automatically, so a stamped tool deploys
# to its own project with no edits.
#
# Push-to-deploy with NO per-repo Cloudflare dashboard/login (handbook/DEPLOY-MODEL.md):
# `wrangler pages deploy` auto-creates the Pages project on first run. The only
# Cloudflare interaction is a one-time API token, set as repo secrets by
# handbook/bin/deploy-onboard.sh — never a manual step per new repo.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create zip-viewer --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=zip-viewer --branch=main
